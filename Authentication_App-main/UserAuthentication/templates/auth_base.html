{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DRISHTI — Authentication{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'UserAuthentication/css/design/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'UserAuthentication/css/design/base.css' %}">
  <link rel="stylesheet" href="{% static 'UserAuthentication/css/components/buttons.css' %}">
  <link rel="stylesheet" href="{% static 'UserAuthentication/css/components/forms.css' %}">
  <link rel="stylesheet" href="{% static 'UserAuthentication/css/components/alerts.css' %}">
  <link rel="stylesheet" href="{% static 'UserAuthentication/css/layout/auth.css' %}">
  {% block extra_css %}{% endblock %}

  <script src="{% static 'UserAuthentication/js/theme.js' %}"></script>
</head>
<body>
  {% block body %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
