<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Library App</title>
    {% load static %}
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'UserAuthentication/base_generic.css' %}">


</head>
<body>
<header>
    <nav>
        {% if user.is_authenticated %}
        <form method="POST" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary">Logout</button>
        </form>
        {% else %}
        <!-- <a href="{% url 'login' %}"><button class="btn btn-primary">Login</button></a>
        <a href="{% url 'register' %}"><button class="btn btn-primary">Register</button></a> -->
        {% endif %}
    </nav>
    <h1 class="text-center py-4">Welcome to User Authentication</h1>
    
    <!-- Clock Display -->
    <div id="clock" style="font-size: 2rem; text-align: center;"></div>

    <div class="top-right-container">   
        <!-- style="position: fixed; top: 50px; right: 20px; display: flex; flex-direction: row-reverse; align-items: center;" -->
        <!-- Clock Display -->
         
        <div id="clock" style="font-size: 1.0rem; color: white;"></div>

        <!-- Toggle Switch for Day/Night Mode -->
        <div class="toggle-container mt-3">
            <label class="switch">
                <input type="checkbox" id="toggle-checkbox">
                <span class="slider round"></span>
            </label>
        </div>
    </div>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<!-- Feedback Button -->
<button id="feedbackButton" class="btn btn-info" style="position: fixed; bottom: 20px; right: 20px;width: auto;">Feedback</button>

<!-- Feedback Popup -->
<div id="feedbackPopup" class="feedback-popup">
    <div class="popup-content">
        <span id="closePopup" class="close">&times;</span>
        <h4>Feedback</h4>
        <form id="feedbackForm" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'UserAuthentication/js/feedback.js' %}"></script>

</body>
</html>
